syntax = "proto3";

package inventory;

option go_package = "github.com/kgugunava/flash_sale_engine/shared/proto/inventory";

import "shared/proto/common/common.proto";
import "shared/proto/order/order.proto";

// The service to manage inventory
service InventoryService {
    // Reserves item after user create an order
    rpc ReserveItems(ReserveItemsRequest) returns (ReserveItemsResponse);
    // Cancel user's reservation 
    rpc CancelReservation(CancelReservationRequest) returns (CancelReservationResponse);
}

                                                ////// DATA STRUCTURES  //////


                                                ////// REQUESTS //////

message ReserveItemsRequest {
    order.Order order = 1;
}

message CancelReservationRequest {
    string reservation_id = 1;
}

                                                ////// RESPONSES //////

message ReserveItemsResponse {
    string reservation_id = 1;
    common.ResponseStatus status = 2;
    common.ResponseError error = 3;
}

message CancelReservationResponse {
    string reservation_id = 1;
    common.ResponseStatus status = 2;
    common.ResponseError error = 3;
}